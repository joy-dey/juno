@if (!isMinimized) {
<div
  class="border justify-center items-center border-slate-100 md:rounded-4xl fixed top-0 bottom-0 md:top-[unset] md:right-6 md:bottom-24 bg-white starting:scale-0 scale-100 shadow-xl transition-all duration-300 ease-in-out origin-bottom z-[99] w-dvw h-dvh md:w-md md:h-[550px]"
>
  <div
    class="border-b border-slate-100 px-4 py-3 flex justify-between w-full items-center"
  >
    <div class="flex items-center gap-2.5">
      <svg
        class="w-7 h-7"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M20.7134 7.12811L20.4668 7.69379C20.2864 8.10792 19.7136 8.10792 19.5331 7.69379L19.2866 7.12811C18.8471 6.11947 18.0555 5.31641 17.0677 4.87708L16.308 4.53922C15.8973 4.35653 15.8973 3.75881 16.308 3.57612L17.0252 3.25714C18.0384 2.80651 18.8442 1.97373 19.2761 0.930828L19.5293 0.319534C19.7058 -0.106511 20.2942 -0.106511 20.4706 0.319534L20.7238 0.930828C21.1558 1.97373 21.9616 2.80651 22.9748 3.25714L23.6919 3.57612C24.1027 3.75881 24.1027 4.35653 23.6919 4.53922L22.9323 4.87708C21.9445 5.31641 21.1529 6.11947 20.7134 7.12811ZM9 2C13.0675 2 16.426 5.03562 16.9337 8.96494L19.1842 12.5037C19.3324 12.7367 19.3025 13.0847 18.9593 13.2317L17 14.071V17C17 18.1046 16.1046 19 15 19H13.001L13 22H4L4.00025 18.3061C4.00033 17.1252 3.56351 16.0087 2.7555 15.0011C1.65707 13.6313 1 11.8924 1 10C1 5.58172 4.58172 2 9 2ZM21.1535 18.1024L19.4893 16.9929C20.4436 15.5642 21 13.8471 21 12.0001C21 11.489 20.9574 10.9878 20.8756 10.5L22.8186 10C22.9378 10.6486 23 11.317 23 12.0001C23 14.2576 22.32 16.3562 21.1535 18.1024Z"
          fill="url(#paint0_linear_287_224)"
        />
        <defs>
          <linearGradient
            id="paint0_linear_287_224"
            x1="12.5"
            y1="0"
            x2="12.5"
            y2="22"
            gradientUnits="userSpaceOnUse"
          >
            <stop stop-color="#FF0069" />
            <stop offset="0.5" stop-color="#D300C5" />
            <stop offset="1" stop-color="#7638FA" />
          </linearGradient>
        </defs>
      </svg>
      <div class="flex flex-col">
        <p class="text-lg leading-tight font-sans">Juno</p>
        <small class="text-slate-400 text-xs font-sans"
          >The AI Powered Assistant</small
        >
      </div>
    </div>
    <button
      (click)="toggleExpanded()"
      class="hidden md:flex hover:bg-slate-100 cursor-pointer justify-center items-center w-10 h-10 rounded-xl"
    >
      @if (isExpanded) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-5 h-5 select-none pointer-events-none"
      >
        <path
          d="M9.00008 4.00008H11.0001V11.0001H4.00008V9.00008H7.58586L3.29297 4.70718L4.70718 3.29297L9.00008 7.58586V4.00008ZM20 15H16.4142L20.7071 19.2929L19.2929 20.7071L15 16.4142V20H13V13H20V15Z"
        ></path>
      </svg>
      } @else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-5 h-5 select-none pointer-events-none"
      >
        <path
          d="M6.41421 5H10V3H3V10H5V6.41421L9.29289 10.7071L10.7071 9.29289L6.41421 5ZM21 14H19V17.5858L14.7071 13.2929L13.2929 14.7071L17.5858 19H14V21H21V14Z"
        ></path>
      </svg>
      }
    </button>
    <button
      (click)="toggleMinimize()"
      class="flex md:hidden hover:bg-slate-100 cursor-pointer justify-center items-center w-10 h-10 rounded-xl"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-5 h-5 select-none pointer-events-none"
      >
        <path
          d="M11.9997 10.5865L16.9495 5.63672L18.3637 7.05093L13.4139 12.0007L18.3637 16.9504L16.9495 18.3646L11.9997 13.4149L7.04996 18.3646L5.63574 16.9504L10.5855 12.0007L5.63574 7.05093L7.04996 5.63672L11.9997 10.5865Z"
        ></path>
      </svg>
    </button>
  </div>

  <div class="p-4 flex flex-col w-full gap-2 overflow-y-auto h-10/12 pb-16">
    @for (message of messages; track $index) { @if (message.from === 'user') {
    <div class="bg-black text-white w-fit ml-auto px-4 py-3 rounded-3xl">
      {{ message.text }}
    </div>
    } @else {
    <div class="bg-stone-100 text-gray-800 w-fit px-4 py-3 rounded-3xl">
      {{ message.text }}
    </div>
    } }
  </div>

  <div class="fixed bottom-4 w-full px-4">
    <div
      class="border border-slate-200 relative bg-white focus-within:border-slate-900 rounded-3xl overflow-clip"
    >
      <form [formGroup]="messageForm" (ngSubmit)="sendMessage()">
        <input
          type="text"
          class="w-full focus:border-0 focus:outline-0 p-3.5 text-sm placeholder:text-slate-500"
          placeholder="Message..."
          formControlName="message"
        />
        <button
          type="submit"
          class="absolute group top-2 cursor-pointer right-2 bg-slate-950 rounded-full ml-auto w-8 h-8 flex justify-center items-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="w-4 h-4 fill-white"
          >
            <path
              d="M1.94607 9.31543C1.42353 9.14125 1.4194 8.86022 1.95682 8.68108L21.043 2.31901C21.5715 2.14285 21.8746 2.43866 21.7265 2.95694L16.2733 22.0432C16.1223 22.5716 15.8177 22.59 15.5944 22.0876L11.9999 14L17.9999 6.00005L9.99992 12L1.94607 9.31543Z"
            ></path>
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>
}
<button
  class="w-14 h-14 rounded-full fixed bottom-6 bg-slate-900 flex justify-center items-center transition-transform duration-200 ease-in-out cursor-pointer right-6 hover:scale-110 z-50"
  title="Talk with Juno"
  (click)="toggleMinimize()"
>
  @if (isMinimized) {
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="currentColor"
    class="fill-white w-6 h-6 transition-transform duration-200 ease-in-out starting:scale-0 scale-100"
  >
    <path
      d="M20.7134 8.12811L20.4668 8.69379C20.2864 9.10792 19.7136 9.10792 19.5331 8.69379L19.2866 8.12811C18.8471 7.11947 18.0555 6.31641 17.0677 5.87708L16.308 5.53922C15.8973 5.35653 15.8973 4.75881 16.308 4.57612L17.0252 4.25714C18.0384 3.80651 18.8442 2.97373 19.2761 1.93083L19.5293 1.31953C19.7058 0.893489 20.2942 0.893489 20.4706 1.31953L20.7238 1.93083C21.1558 2.97373 21.9616 3.80651 22.9748 4.25714L23.6919 4.57612C24.1027 4.75881 24.1027 5.35653 23.6919 5.53922L22.9323 5.87708C21.9445 6.31641 21.1529 7.11947 20.7134 8.12811ZM20 11C20.6986 11 21.3694 10.8806 21.9929 10.6611C21.9976 10.7735 22 10.8865 22 11C22 15.4183 18.4183 19 14 19V22.5C9 20.5 2 17.5 2 11C2 6.58172 5.58172 3 10 3H14C14.1135 3 14.2265 3.00237 14.3389 3.00705C14.1194 3.63061 14 4.30136 14 5C14 8.31371 16.6863 11 20 11Z"
    ></path>
  </svg>
  } @else {
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="currentColor"
    class="fill-white w-6 h-6 transition-transform duration-300 ease-in-out starting:scale-0 starting:-rotate-90 scale-100 rotate-0"
  >
    <path
      d="M12 15.6315L20.9679 10.8838L20.0321 9.11619L12 13.3685L3.9679 9.11619L3.03212 10.8838L12 15.6315Z"
    ></path>
  </svg>
  }
</button>
